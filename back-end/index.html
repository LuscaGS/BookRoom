<!DOCTYPE html>
<html lang="pt-pt">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./public/css/index.css">

<body>
    <header class="navbar">
        <div class="logo">
            <img src="./public/img/logo_classroom.png" alt="Logo">
